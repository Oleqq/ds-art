name: deploy production over ftp

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run production database migrations from GitHub Actions
        required: true
        type: boolean
        default: false
      seed_database:
        description: Seed demo data after migrations. Use only once on an empty production database.
        required: true
        type: boolean
        default: false

concurrency:
  group: production-ftp
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload production files
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_APP_DIR: ${{ vars.FTP_APP_DIR }}
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL }}
      PRODUCTION_APP_KEY: ${{ secrets.PRODUCTION_APP_KEY }}
      PRODUCTION_DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
      PRODUCTION_DB_PORT: ${{ secrets.PRODUCTION_DB_PORT }}
      PRODUCTION_DB_DATABASE: ${{ secrets.PRODUCTION_DB_DATABASE }}
      PRODUCTION_DB_USERNAME: ${{ secrets.PRODUCTION_DB_USERNAME }}
      PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          test -n "$FTP_HOST" || (echo "Missing secret FTP_HOST" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing secret FTP_USERNAME" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing secret FTP_PASSWORD" && exit 1)
          test -n "$FTP_APP_DIR" || (echo "Missing repository variable FTP_APP_DIR" && exit 1)

          if [ "${{ inputs.run_migrations }}" = "true" ] || [ "${{ inputs.seed_database }}" = "true" ]; then
            test -n "$PRODUCTION_APP_URL" || (echo "Missing repository variable PRODUCTION_APP_URL" && exit 1)
            test -n "$PRODUCTION_APP_KEY" || (echo "Missing secret PRODUCTION_APP_KEY" && exit 1)
            test -n "$PRODUCTION_DB_HOST" || (echo "Missing secret PRODUCTION_DB_HOST" && exit 1)
            test -n "$PRODUCTION_DB_PORT" || (echo "Missing secret PRODUCTION_DB_PORT" && exit 1)
            test -n "$PRODUCTION_DB_DATABASE" || (echo "Missing secret PRODUCTION_DB_DATABASE" && exit 1)
            test -n "$PRODUCTION_DB_USERNAME" || (echo "Missing secret PRODUCTION_DB_USERNAME" && exit 1)
            test -n "$PRODUCTION_DB_PASSWORD" || (echo "Missing secret PRODUCTION_DB_PASSWORD" && exit 1)
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Clear local framework caches before packaging
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan event:clear

      - name: Create production environment file for database tasks
        if: ${{ inputs.run_migrations || inputs.seed_database }}
        shell: bash
        run: |
          cat > .env <<EOF
          APP_NAME="DS Art"
          APP_ENV=production
          APP_KEY=$PRODUCTION_APP_KEY
          APP_DEBUG=false
          APP_URL=$PRODUCTION_APP_URL

          APP_LOCALE=ru
          APP_FALLBACK_LOCALE=ru
          APP_FAKER_LOCALE=ru_RU

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=$PRODUCTION_DB_HOST
          DB_PORT=$PRODUCTION_DB_PORT
          DB_DATABASE=$PRODUCTION_DB_DATABASE
          DB_USERNAME=$PRODUCTION_DB_USERNAME
          DB_PASSWORD=$PRODUCTION_DB_PASSWORD

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          FILESYSTEM_DISK=public

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="no-reply@example.com"
          MAIL_FROM_NAME="\${APP_NAME}"

          VITE_APP_NAME="\${APP_NAME}"
          EOF

      - name: Run production database migrations
        if: ${{ inputs.run_migrations }}
        run: php artisan migrate --force --no-interaction

      - name: Seed production database once
        if: ${{ inputs.seed_database }}
        run: php artisan db:seed --force --no-interaction

      - name: Prepare deploy package
        shell: bash
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/ds-art-app"
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete ./ "$DEPLOY_DIR/" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".env" \
            --exclude=".env.backup" \
            --exclude=".env.production" \
            --exclude="auth.json" \
            --exclude="node_modules/" \
            --exclude="tests/" \
            --exclude="docs/private/" \
            --exclude="storage/app/public/*" \
            --exclude="storage/framework/cache/data/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            --exclude="storage/logs/*"
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload package over FTP
        shell: bash
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-allow true
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          mkdir -p "$FTP_APP_DIR"
          mirror -R --delete --verbose --parallel=4 \
            --exclude-glob .env \
            --exclude-glob storage/app/public/* \
            --exclude-glob public/storage \
            "$DEPLOY_DIR" "$FTP_APP_DIR"
          bye
          EOF
