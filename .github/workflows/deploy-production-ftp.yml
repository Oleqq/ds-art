name: deploy production over ftp

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run production database migrations on the hosting after FTP upload
        required: true
        type: boolean
        default: false
      seed_database:
        description: Seed demo data after migrations. Use only once on an empty production database.
        required: true
        type: boolean
        default: false

concurrency:
  group: production-ftp
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload production files
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_APP_DIR: ${{ vars.FTP_APP_DIR }}
      FTP_PUBLIC_DIR: ${{ vars.FTP_PUBLIC_DIR }}
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          test -n "$FTP_HOST" || (echo "Missing secret FTP_HOST" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing secret FTP_USERNAME" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing secret FTP_PASSWORD" && exit 1)
          test -n "$FTP_APP_DIR" || (echo "Missing repository variable FTP_APP_DIR" && exit 1)

          if [ "${{ inputs.run_migrations }}" = "true" ] || [ "${{ inputs.seed_database }}" = "true" ]; then
            test -n "$PRODUCTION_APP_URL" || (echo "Missing repository variable PRODUCTION_APP_URL" && exit 1)
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Clear local framework caches before packaging
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan event:clear

      - name: Prepare deploy package
        shell: bash
        run: |
          APP_DEPLOY_DIR="$RUNNER_TEMP/ds-art-app"
          PUBLIC_DEPLOY_DIR="$RUNNER_TEMP/ds-art-public"

          mkdir -p "$APP_DEPLOY_DIR" "$PUBLIC_DEPLOY_DIR"

          rsync -a --delete ./ "$APP_DEPLOY_DIR/" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".env" \
            --exclude=".env.backup" \
            --exclude=".env.production" \
            --exclude="auth.json" \
            --exclude="node_modules/" \
            --exclude="tests/" \
            --exclude="docs/private/" \
            --exclude="storage/app/public/*" \
            --exclude="storage/framework/cache/data/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            --exclude="storage/logs/*"

          rsync -a --delete "$APP_DEPLOY_DIR/public/" "$PUBLIC_DEPLOY_DIR/" \
            --exclude="storage" \
            --exclude="storage/*"

          cat > "$PUBLIC_DEPLOY_DIR/index.php" <<'PHP'
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/../ds-art-app/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/../ds-art-app/vendor/autoload.php';

          /** @var Application $app */
          $app = require_once __DIR__.'/../ds-art-app/bootstrap/app.php';

          $app->handleRequest(Request::capture());
          PHP

          if [ "${{ inputs.run_migrations }}" = "true" ] || [ "${{ inputs.seed_database }}" = "true" ]; then
            DEPLOY_RUNNER_TOKEN="$(openssl rand -hex 32)"

            cat > "$PUBLIC_DEPLOY_DIR/__ds_art_deploy_runner.php" <<PHP
          <?php

          declare(strict_types=1);

          use Illuminate\Contracts\Console\Kernel;

          @set_time_limit(300);

          header('Content-Type: application/json; charset=utf-8');

          \$expectedToken = '$DEPLOY_RUNNER_TOKEN';
          \$providedToken = (string) (\$_GET['token'] ?? '');

          if (! hash_equals(\$expectedToken, \$providedToken)) {
              http_response_code(404);
              echo json_encode(['ok' => false, 'message' => 'Not found']);
              exit;
          }

          \$appPath = realpath(__DIR__.'/../ds-art-app');

          if (\$appPath === false || ! is_file(\$appPath.'/artisan')) {
              http_response_code(500);
              echo json_encode(['ok' => false, 'message' => 'Laravel app path is not available']);
              exit;
          }

          chdir(\$appPath);

          require \$appPath.'/vendor/autoload.php';

          \$app = require_once \$appPath.'/bootstrap/app.php';

          /** @var Kernel \$kernel */
          \$kernel = \$app->make(Kernel::class);
          \$commands = [];

          if (filter_var(\$_GET['migrate'] ?? false, FILTER_VALIDATE_BOOLEAN)) {
              \$commands[] = ['name' => 'migrate', 'arguments' => ['--force' => true, '--no-interaction' => true]];
          }

          if (filter_var(\$_GET['seed'] ?? false, FILTER_VALIDATE_BOOLEAN)) {
              \$commands[] = ['name' => 'db:seed', 'arguments' => ['--force' => true, '--no-interaction' => true]];
          }

          \$results = [];

          foreach (\$commands as \$command) {
              \$exitCode = \$kernel->call(\$command['name'], \$command['arguments']);
              \$output = trim(\$kernel->output());

              \$results[] = [
                  'command' => \$command['name'],
                  'exit_code' => \$exitCode,
                  'output' => \$output,
              ];

              if (\$exitCode !== 0) {
                  http_response_code(500);
                  echo json_encode(['ok' => false, 'results' => \$results], JSON_UNESCAPED_UNICODE);
                  exit;
              }
          }

          echo json_encode(['ok' => true, 'results' => \$results], JSON_UNESCAPED_UNICODE);
          PHP

            echo "DEPLOY_RUNNER_TOKEN=$DEPLOY_RUNNER_TOKEN" >> "$GITHUB_ENV"
          fi

          echo "APP_DEPLOY_DIR=$APP_DEPLOY_DIR" >> "$GITHUB_ENV"
          echo "PUBLIC_DEPLOY_DIR=$PUBLIC_DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload package over FTP
        shell: bash
        run: |
          PUBLIC_DIR="${FTP_PUBLIC_DIR:-/public_html}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-allow true
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          mkdir -p "$FTP_APP_DIR"
          mkdir -p "$PUBLIC_DIR"
          mirror -R --delete --verbose --parallel=4 \
            --exclude-glob .env \
            --exclude-glob storage/app/public/* \
            --exclude-glob public/storage \
            "$APP_DEPLOY_DIR" "$FTP_APP_DIR"
          mirror -R --delete --verbose --parallel=4 \
            --exclude-glob storage \
            --exclude-glob storage/* \
            --exclude-glob .well-known \
            --exclude-glob .well-known/* \
            "$PUBLIC_DEPLOY_DIR" "$PUBLIC_DIR"
          bye
          EOF

      - name: Run server-side production database tasks
        if: ${{ inputs.run_migrations || inputs.seed_database }}
        shell: bash
        run: |
          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error --max-time 240 \
              --write-out "%{http_code}" \
              --output "$response_file" \
              "${PRODUCTION_APP_URL%/}/__ds_art_deploy_runner.php?token=${DEPLOY_RUNNER_TOKEN}&migrate=${{ inputs.run_migrations }}&seed=${{ inputs.seed_database }}"
          )"

          cat "$response_file"
          echo

          if [ "$status_code" != "200" ] || ! grep -q '"ok":true' "$response_file"; then
            echo "Server-side database task failed with HTTP $status_code"
            exit 1
          fi

      - name: Remove temporary deploy runner
        if: ${{ always() && (inputs.run_migrations || inputs.seed_database) }}
        shell: bash
        run: |
          PUBLIC_DIR="${FTP_PUBLIC_DIR:-/public_html}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-allow true
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          rm -f "$PUBLIC_DIR/__ds_art_deploy_runner.php"
          bye
          EOF
